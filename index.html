<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Top Bot — 1 Level Remake</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b1020; color: #eaf2ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas {
    background: linear-gradient(#1a2350 0%, #2b3a8a 60%, #4f6cc9 100%);
    image-rendering: pixelated; touch-action: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    max-width: 100vw; max-height: 100vh;
  }
  #hud {
    position: fixed; top: 10px; left: 0; right: 0; pointer-events: none;
    display: flex; justify-content: space-between; padding: 0 16px;
    font-weight: 700; font-size: 16px; text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  #hud .pill {
    background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 999px; padding: 6px 12px; pointer-events: auto;
  }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,12,30,0.78); backdrop-filter: blur(4px);
    text-align: center; padding: 24px; z-index: 5;
  }
  #overlay h1 {
    font-size: 40px; margin: 0 0 8px; letter-spacing: 1px;
    background: linear-gradient(90deg, #ffd166, #ef476f, #06d6a0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  #overlay p { max-width: 520px; line-height: 1.5; opacity: 0.9; }
  #overlay button {
    margin-top: 18px;
    background: linear-gradient(180deg, #ffd166, #f08a3e);
    color: #1a1330; border: 0; padding: 14px 28px; border-radius: 999px;
    font-weight: 800; font-size: 18px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(240,138,62,0.45);
  }
  #overlay button:active { transform: translateY(1px); }
  #overlay.hidden { display: none; }
  .key { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); padding: 2px 8px; border-radius: 6px; font-family: ui-monospace, Menlo, Consolas, monospace; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>

<div id="hud">
  <div class="pill" id="hudTime">00.00s</div>
  <div class="pill" id="hudGems">Gems 0 / 0</div>
  <div class="pill" id="hudDist">0 m</div>
</div>

<div id="overlay">
  <h1>TOP BOT</h1>
  <p>
    Fly through the passageway as fast as you can. <b>Hold tap / click /
    <span class="key">Space</span></b> to thrust upward, release to fall.
    Hit <b style="color:#7CFC9A">green strips</b> for a boost, grab
    <b style="color:#FF5577">red gems</b> for extra zip. Reach the checkered flag!
  </p>
  <button id="startBtn">Start Level 1</button>
  <p style="opacity:.6;font-size:12px;margin-top:12px;">A 1-level remake inspired by Top Bot (2013).</p>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const startBtn = document.getElementById("startBtn");
  const hudTime = document.getElementById("hudTime");
  const hudGems = document.getElementById("hudGems");
  const hudDist = document.getElementById("hudDist");

  const W = canvas.width;
  const H = canvas.height;

  // ---------- Level: corridor ----------
  const LEVEL_LENGTH = 6400;
  const FINISH_X = LEVEL_LENGTH - 120;

  // Corridor centerline and half-height as functions of worldX.
  // Start and end are flatter/wider for fair launches and landings.
  function easeEnds(x) {
    const startEase = Math.min(1, x / 500);
    const endEase = Math.min(1, (LEVEL_LENGTH - x) / 500);
    return Math.min(startEase, endEase); // 0 at edges, 1 in the middle
  }
  function centerY(x) {
    const e = easeEnds(x);
    return H * 0.5 + (Math.sin(x * 0.0032) * 80 + Math.sin(x * 0.0095) * 28) * e;
  }
  function halfH(x) {
    const e = easeEnds(x);
    // 170px wide near edges, ~110px in the middle, with mild oscillation.
    return 170 - 60 * e + Math.sin(x * 0.0061) * 14 * e;
  }
  function topY(x)    { return centerY(x) - halfH(x); }
  function bottomY(x) { return centerY(x) + halfH(x); }

  // ---------- Pickups & boosts ----------
  const gems = [];
  const stripes = [];
  const obstacles = []; // pillars hanging from top or rising from bottom

  function rand(min, max) { return min + Math.random() * (max - min); }

  // Gem clusters: place inside the corridor, varying vertical position.
  for (let x = 320; x < FINISH_X - 200; x += rand(180, 320)) {
    const cy = centerY(x);
    const hh = halfH(x);
    const sign = Math.random() < 0.5 ? -1 : 1;
    const baseG = cy + sign * rand(0, hh - 28);
    const count = 3 + (Math.random() < 0.4 ? 2 : 0);
    for (let i = 0; i < count; i++) {
      const gx = x + i * 26;
      const gy = baseG + Math.sin(i * 0.6) * 6;
      gems.push({ x: gx, y: gy, r: 8, taken: false, spin: Math.random() * Math.PI });
    }
  }

  // Speed stripes: vertical green ribbons spanning the corridor that boost on touch.
  for (let x = 520; x < FINISH_X - 300; x += rand(520, 820)) {
    stripes.push({ x, w: 22, used: false });
  }

  // Obstacles: pillars from top or bottom of the corridor. Length scales with
  // corridor half-height so the gap is always passable. Skip placements near
  // start, finish, or any speed stripe.
  function nearStripe(x) {
    return stripes.some(s => Math.abs((s.x + s.w / 2) - x) < 110);
  }
  for (let x = 600; x < FINISH_X - 400; x += rand(280, 460)) {
    if (nearStripe(x)) continue;
    const hh = halfH(x);
    const len = rand(0.35, 0.7) * (2 * hh);
    const w = rand(22, 36);
    const side = Math.random() < 0.5 ? "top" : "bot";
    obstacles.push({ x, w, len, side });
  }

  // Remove gems that ended up inside an obstacle rectangle.
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    for (const o of obstacles) {
      if (g.x < o.x - 4 || g.x > o.x + o.w + 4) continue;
      const midX = o.x + o.w / 2;
      const rectY = o.side === "top" ? topY(midX) : (bottomY(midX) - o.len);
      if (g.y >= rectY - 4 && g.y <= rectY + o.len + 4) {
        gems.splice(i, 1);
        break;
      }
    }
  }

  const totalGems = gems.length;

  // ---------- Player ----------
  const player = {
    x: 80, y: 0,
    vx: 280, vy: 0,
    r: 16,
    boost: 0,
    holding: false,
    finished: false,
    gemsTaken: 0,
    invuln: 0,    // seconds remaining of post-hit grace
    hitFlash: 0,  // seconds remaining of red flash on the bot
    hits: 0,
  };

  let shake = 0; // camera shake intensity (px), decays each frame

  // Physics tuning
  const GRAVITY = 1100;          // px/sec^2 (down)
  const THRUST  = 2300;          // px/sec^2 (up, while holding)
  const VY_MAX  = 700;
  const MIN_FORWARD = 240;
  const MAX_FORWARD = 540;
  const BOOST_FORWARD = 460;
  const FORWARD_DECAY = 50;
  const STRIPE_BOOST = 1.4;
  const GEM_BOOST = 0.45;
  // Wall hit response
  const HIT_SLOW_MULT = 0.55;   // multiplies vx on impact
  const HIT_SLOW_FLOOR = 150;   // vx never drops below this from a hit
  const HIT_INVULN = 0.35;      // seconds of grace after a hit
  const HIT_FLASH = 0.25;       // seconds of red flash on the bot
  const HIT_SHAKE = 7;          // px of camera shake on impact

  // ---------- Input ----------
  function press()   { player.holding = true; }
  function release() { player.holding = false; }
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); press(); }
    if (e.code === "Enter" && player.finished) restart();
  });
  window.addEventListener("keyup", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); release(); }
  });
  canvas.addEventListener("mousedown", press);
  canvas.addEventListener("mouseup", release);
  canvas.addEventListener("mouseleave", release);
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); press(); }, { passive: false });
  canvas.addEventListener("touchend",   (e) => { e.preventDefault(); release(); }, { passive: false });

  // ---------- State ----------
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let camX = 0;

  const particles = [];
  function spawnParticles(x, y, color, count, speed = 180) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = speed * (0.4 + Math.random() * 0.8);
      particles.push({
        x, y,
        vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80,
        life: 0.5 + Math.random() * 0.4, age: 0,
        color, size: 2 + Math.random() * 2,
      });
    }
  }

  function applyHit(sparkX, sparkY) {
    if (player.invuln > 0) return;
    player.vx = Math.max(HIT_SLOW_FLOOR, player.vx * HIT_SLOW_MULT);
    player.boost = 0;
    player.invuln = HIT_INVULN;
    player.hitFlash = HIT_FLASH;
    player.hits++;
    shake = HIT_SHAKE;
    spawnParticles(sparkX, sparkY, "#ffd166", 14, 220);
  }

  function restart() {
    for (const g of gems) g.taken = false;
    for (const s of stripes) s.used = false;
    particles.length = 0;
    player.x = 80;
    player.y = centerY(player.x);
    player.vx = MIN_FORWARD;
    player.vy = 0;
    player.boost = 0;
    player.finished = false;
    player.gemsTaken = 0;
    player.invuln = 0;
    player.hitFlash = 0;
    player.hits = 0;
    shake = 0;
    camX = 0;
    elapsed = 0;
    startTime = performance.now();
    running = true;
    overlay.classList.add("hidden");
  }

  function endGame(title, sub) {
    running = false;
    overlay.classList.remove("hidden");
    overlay.querySelector("h1").textContent = title;
    overlay.querySelector("p").innerHTML = sub;
    startBtn.textContent = "Play again";
  }

  startBtn.addEventListener("click", restart);

  // ---------- Update / draw ----------
  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    if (running) {
      update(dt);
      elapsed = (now - startTime) / 1000;
    }
    draw();
    requestAnimationFrame(frame);
  }

  function update(dt) {
    // Forward speed
    if (player.boost > 0) {
      player.vx += (BOOST_FORWARD - player.vx) * Math.min(1, dt * 6);
      player.boost -= dt;
    } else {
      player.vx -= FORWARD_DECAY * dt;
      if (player.vx < MIN_FORWARD) player.vx = MIN_FORWARD;
    }
    if (player.vx > MAX_FORWARD) player.vx = MAX_FORWARD;

    // Vertical: gravity + (optional) thrust
    const a = GRAVITY + (player.holding ? -THRUST : 0);
    player.vy += a * dt;
    if (player.vy >  VY_MAX) player.vy =  VY_MAX;
    if (player.vy < -VY_MAX) player.vy = -VY_MAX;

    // Position
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Corridor collision: clamp position; slow down on impact (with invuln window).
    const top = topY(player.x);
    const bot = bottomY(player.x);
    let hitWall = null;
    if (player.y - player.r < top) {
      player.y = top + player.r;
      if (player.vy < 0) player.vy = 0;
      hitWall = "top";
    } else if (player.y + player.r > bot) {
      player.y = bot - player.r;
      if (player.vy > 0) player.vy = 0;
      hitWall = "bot";
    }
    if (hitWall) {
      const sparkY = hitWall === "top" ? top : bot;
      applyHit(player.x, sparkY);
    }

    // Obstacles inside the corridor (circle-vs-rect)
    for (const o of obstacles) {
      if (o.x + o.w < player.x - player.r) continue;
      if (o.x > player.x + player.r) break;
      const midX = o.x + o.w / 2;
      const rectY = o.side === "top" ? topY(midX) : (bottomY(midX) - o.len);
      const rectH = o.len;
      const cx = Math.max(o.x, Math.min(player.x, o.x + o.w));
      const cy = Math.max(rectY, Math.min(player.y, rectY + rectH));
      const dx = player.x - cx;
      const dy = player.y - cy;
      if (dx * dx + dy * dy < player.r * player.r) {
        const d = Math.sqrt(dx * dx + dy * dy) || 0.0001;
        const nx = dx / d, ny = dy / d;
        const overlap = player.r - d + 0.5;
        player.x += nx * overlap;
        player.y += ny * overlap;
        // Kill velocity component into the obstacle
        const vDot = player.vx * nx + player.vy * ny;
        if (vDot < 0) {
          player.vx -= vDot * nx;
          player.vy -= vDot * ny;
        }
        applyHit(cx, cy);
      }
    }

    // Decay timers
    if (player.invuln  > 0) player.invuln  -= dt;
    if (player.hitFlash > 0) player.hitFlash -= dt;
    if (shake > 0) shake = Math.max(0, shake - 30 * dt);

    // Stripe interaction (touch the green ribbon)
    for (const s of stripes) {
      if (s.used) continue;
      if (player.x + player.r > s.x && player.x - player.r < s.x + s.w) {
        s.used = true;
        player.boost = Math.max(player.boost, STRIPE_BOOST);
        player.vx = BOOST_FORWARD;
        spawnParticles(player.x, player.y, "#7CFC9A", 22, 260);
        break;
      }
    }

    // Gem pickups
    for (const g of gems) {
      if (g.taken) continue;
      const dx = g.x - player.x;
      const dy = g.y - player.y;
      if (dx * dx + dy * dy < (g.r + player.r) * (g.r + player.r)) {
        g.taken = true;
        player.gemsTaken++;
        player.boost = Math.max(player.boost, GEM_BOOST);
        spawnParticles(g.x, g.y, "#FF5577", 14, 220);
      }
    }

    // Camera follow (with hit shake offset applied at draw time)
    const targetCam = player.x - W * 0.32;
    camX += (targetCam - camX) * Math.min(1, dt * 6);
    if (camX < 0) camX = 0;
    if (camX > LEVEL_LENGTH - W) camX = LEVEL_LENGTH - W;

    // Particles
    for (const p of particles) {
      p.age += dt;
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      if (particles[i].age >= particles[i].life) particles.splice(i, 1);
    }

    // Win
    if (!player.finished && player.x >= FINISH_X) {
      player.finished = true;
      const star = player.gemsTaken === totalGems ? " ★★★" :
                   (player.gemsTaken > totalGems * 0.6 ? " ★★" : " ★");
      endGame("Level Cleared!" + star,
        `Time: <b>${elapsed.toFixed(2)}s</b><br/>Gems: <b>${player.gemsTaken} / ${totalGems}</b> &nbsp; Wall hits: <b>${player.hits}</b>`);
    }
  }

  // ---------- Drawing ----------
  function drawParallax() {
    ctx.fillStyle = "#1f2a5b";
    ctx.beginPath();
    ctx.moveTo(0, H);
    const off1 = camX * 0.15;
    for (let x = 0; x <= W; x += 40) {
      const wx = x + off1;
      const y = H * 0.55 + Math.sin(wx * 0.004) * 30 + Math.sin(wx * 0.011) * 14;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#28367a";
    ctx.beginPath();
    ctx.moveTo(0, H);
    const off2 = camX * 0.35;
    for (let x = 0; x <= W; x += 30) {
      const wx = x + off2;
      const y = H * 0.65 + Math.sin(wx * 0.006) * 26 + Math.sin(wx * 0.02) * 8;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.5)";
    for (let i = 0; i < 60; i++) {
      const sx = (i * 113 - camX * 0.05) % W;
      const x = sx < 0 ? sx + W : sx;
      const y = (i * 37) % (H * 0.45);
      ctx.fillRect(x, y, 2, 2);
    }
  }

  function drawCorridor() {
    // Sample corridor along the visible window.
    const samples = [];
    const step = 12;
    for (let sx = -step; sx <= W + step; sx += step) {
      const wx = sx + camX;
      samples.push({ sx, t: topY(wx), b: bottomY(wx) });
    }

    // Top wall (rock above topY)
    ctx.beginPath();
    ctx.moveTo(samples[0].sx, 0);
    for (const s of samples) ctx.lineTo(s.sx, s.t);
    ctx.lineTo(samples[samples.length - 1].sx, 0);
    ctx.closePath();
    const gTop = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    gTop.addColorStop(0, "#1a1330");
    gTop.addColorStop(1, "#3b2a55");
    ctx.fillStyle = gTop;
    ctx.fill();

    // Bottom wall (rock below bottomY)
    ctx.beginPath();
    ctx.moveTo(samples[0].sx, H);
    for (const s of samples) ctx.lineTo(s.sx, s.b);
    ctx.lineTo(samples[samples.length - 1].sx, H);
    ctx.closePath();
    const gBot = ctx.createLinearGradient(0, H * 0.4, 0, H);
    gBot.addColorStop(0, "#3b2a55");
    gBot.addColorStop(1, "#150b22");
    ctx.fillStyle = gBot;
    ctx.fill();

    // Inside edges
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.beginPath();
    samples.forEach((s, i) => i ? ctx.lineTo(s.sx, s.t) : ctx.moveTo(s.sx, s.t));
    ctx.stroke();
    ctx.beginPath();
    samples.forEach((s, i) => i ? ctx.lineTo(s.sx, s.b) : ctx.moveTo(s.sx, s.b));
    ctx.stroke();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      const sx = o.x - camX;
      if (sx + o.w < -10 || sx > W + 10) continue;
      const midX = o.x + o.w / 2;
      const y = o.side === "top" ? topY(midX) : (bottomY(midX) - o.len);
      // Body matches wall palette
      const grad = ctx.createLinearGradient(sx, y, sx, y + o.len);
      grad.addColorStop(0, "#3b2a55");
      grad.addColorStop(1, "#1a1330");
      ctx.fillStyle = grad;
      ctx.fillRect(sx, y, o.w, o.len);
      // Highlight along the inside-facing edge
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      if (o.side === "top") ctx.fillRect(sx, y + o.len - 3, o.w, 3);
      else ctx.fillRect(sx, y, o.w, 3);
      // Side stripes for readability
      ctx.fillStyle = "rgba(255,209,102,0.5)";
      ctx.fillRect(sx, y, 2, o.len);
      ctx.fillRect(sx + o.w - 2, y, 2, o.len);
    }
  }

  function drawStripes() {
    for (const s of stripes) {
      const sx = s.x - camX;
      if (sx + s.w < -10 || sx > W + 10) continue;
      const t = topY(s.x);
      const b = bottomY(s.x);
      const grad = ctx.createLinearGradient(sx, 0, sx + s.w, 0);
      grad.addColorStop(0, s.used ? "#3a6a3a" : "#9CFFB0");
      grad.addColorStop(1, s.used ? "#1d3a1d" : "#22C55E");
      ctx.fillStyle = grad;
      ctx.fillRect(sx, t, s.w, b - t);

      // Chevrons inside the ribbon
      ctx.fillStyle = s.used ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.7)";
      const tt = performance.now() / 240;
      for (let yy = t + 6; yy < b - 6; yy += 16) {
        const off = ((tt * 30 + yy) % 16);
        ctx.beginPath();
        ctx.moveTo(sx + 4, yy + off);
        ctx.lineTo(sx + s.w - 4, yy + off + 6);
        ctx.lineTo(sx + s.w - 4, yy + off + 2);
        ctx.lineTo(sx + 4, yy + off - 4);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  function drawGems() {
    for (const g of gems) {
      if (g.taken) continue;
      const sx = g.x - camX;
      if (sx < -20 || sx > W + 20) continue;
      g.spin += 0.06;
      ctx.save();
      ctx.translate(sx, g.y);
      ctx.rotate(g.spin);
      const wob = Math.sin(performance.now() * 0.005 + g.x) * 2;
      ctx.translate(0, wob);
      ctx.beginPath();
      ctx.moveTo(0, -10); ctx.lineTo(8, 0); ctx.lineTo(0, 10); ctx.lineTo(-8, 0);
      ctx.closePath();
      const gg = ctx.createLinearGradient(-8, -10, 8, 10);
      gg.addColorStop(0, "#ffadc0"); gg.addColorStop(1, "#ff2e58");
      ctx.fillStyle = gg;
      ctx.shadowColor = "#ff5577"; ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.beginPath();
      ctx.moveTo(-2, -6); ctx.lineTo(2, -6); ctx.lineTo(0, -2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawFinish() {
    const sx = FINISH_X - camX;
    if (sx < -40 || sx > W + 40) return;
    const t = topY(FINISH_X), b = bottomY(FINISH_X);
    ctx.fillStyle = "#cfd8ff";
    ctx.fillRect(sx - 2, t, 4, b - t);
    const fw = 56, fh = 36;
    const fy = t + 4;
    for (let yy = 0; yy < fh; yy += 9) {
      for (let xx = 0; xx < fw; xx += 9) {
        const odd = (((xx / 9) | 0) + ((yy / 9) | 0)) & 1;
        ctx.fillStyle = odd ? "#ffffff" : "#1a1330";
        ctx.fillRect(sx + 2 + xx, fy + yy, 9, 9);
      }
    }
  }

  function drawPlayer() {
    const sx = player.x - camX;
    const sy = player.y;
    ctx.save();
    ctx.translate(sx, sy);
    const tilt = Math.atan2(player.vy, Math.max(60, player.vx)) * 0.45;
    ctx.rotate(tilt);

    if (player.boost > 0) {
      ctx.fillStyle = "rgba(255,200,80,0.5)";
      ctx.beginPath();
      ctx.ellipse(-player.r - 8, 0, 18, 6, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (player.holding) {
      ctx.fillStyle = "rgba(180,220,255,0.6)";
      ctx.beginPath();
      ctx.ellipse(0, player.r + 6, 6, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    const flash = Math.max(0, player.hitFlash) / HIT_FLASH;
    const bodyGrad = ctx.createLinearGradient(0, -player.r, 0, player.r);
    if (flash > 0) {
      bodyGrad.addColorStop(0, "#ffd1d6");
      bodyGrad.addColorStop(1, "#c0383f");
    } else {
      bodyGrad.addColorStop(0, "#bfd8ff");
      bodyGrad.addColorStop(1, "#5a78c9");
    }
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();
    if (player.invuln > 0) {
      // faint shield ring during invuln
      ctx.strokeStyle = `rgba(255,209,102,${0.3 + 0.3 * Math.sin(performance.now() * 0.04)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, player.r + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.fillStyle = "#0e1a40";
    ctx.fillRect(-10, -6, 20, 8);
    ctx.fillStyle = player.boost > 0 ? "#ffd166" : "#7CFC9A";
    ctx.fillRect(-2, -4, 4, 4);
    ctx.strokeStyle = "#cfd8ff"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -player.r); ctx.lineTo(0, -player.r - 8);
    ctx.stroke();
    ctx.fillStyle = "#ff5577";
    ctx.beginPath();
    ctx.arc(0, -player.r - 10, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const sx = p.x - camX;
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color;
      ctx.fillRect(sx - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawProgressBar() {
    const pct = Math.min(1, player.x / FINISH_X);
    const barW = W - 80, barH = 8, barX = 40, barY = H - 22;
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = "#7CFC9A";
    ctx.fillRect(barX, barY, barW * pct, barH);
    ctx.fillStyle = "#ffd166";
    ctx.fillRect(barX + barW * pct - 2, barY - 2, 4, barH + 4);
    ctx.fillStyle = "#fff";
    ctx.fillRect(barX + barW - 2, barY - 4, 2, barH + 8);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    drawParallax();
    drawCorridor();
    drawObstacles();
    drawStripes();
    drawGems();
    drawFinish();
    drawParticles();
    drawPlayer();
    ctx.restore();
    drawProgressBar();

    hudTime.textContent = elapsed.toFixed(2) + "s";
    hudGems.textContent = `Gems ${player.gemsTaken} / ${totalGems}`;
    hudDist.textContent = `${Math.floor(player.x / 20)} m`;
  }

  // Initial pose
  player.y = centerY(player.x);
  requestAnimationFrame((t) => { last = t; frame(t); });
})();
</script>
</body>
</html>
